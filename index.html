<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Icon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1b1c21;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .support-pill {
            width: 48px;
            height: 90px;
            transform: scale(2);
            border-radius: 500px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            padding: 4px;
            gap: 2px;
        }

        /* ── Glow effects ── */
        .glow {
            position: absolute;
            width: 81.5px;
            height: 81.5px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.12s cubic-bezier(0.4, 0, 1, 1);
            z-index: 0;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .glow--blue {
            top: 24px;
        }

        .glow--color {
            top: 66px;
        }

        .support-pill.is-hovering-top .glow--blue,
        .support-pill.is-hovering-bottom .glow--color {
            opacity: 1;
            transition: opacity 0.3s cubic-bezier(0, 0, 0.2, 1);
        }

        /* ── Dark circle indicator ── */
        .indicator {
            position: absolute;
            width: 40px;
            height: 40px;
            left: 4px;
            top: 46px;
            z-index: 1;
            transition: top 0.45s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }

        .indicator svg {
            display: block;
            width: 100%;
            height: 100%;
        }

        .indicator.at-top {
            top: 4px;
        }

        /* ── Icon slots ── */
        .icon-slot {
            position: relative;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            flex-shrink: 0;
        }

        .icon-slot--chat svg {
            width: 24px;
            height: 24px;
            display: block;
        }

        .icon-slot--ai svg {
            width: 40px;
            height: 40px;
            display: block;
        }
    </style>
</head>

    <script>
        const pill = document.getElementById('pill');
        const iconTop = document.getElementById('iconTop');
        const iconBottom = document.getElementById('iconBottom');
        const indicator = document.getElementById('indicator');

        let currentPosition = 'bottom';
        let glowTimeout = null;

        function setHover(position) {
            if (glowTimeout) {
                clearTimeout(glowTimeout);
                glowTimeout = null;
            }

            const isSwitch = currentPosition !== position;
            currentPosition = position;

            // Move circle immediately
            indicator.classList.toggle('at-top', position === 'top');

            // Remove old glow immediately
            pill.classList.remove('is-hovering-top', 'is-hovering-bottom');

            const glowClass = 'is-hovering-' + position;

            if (isSwitch) {
                // Switching: circle moves first, glow fades in after it arrives
                glowTimeout = setTimeout(() => {
                    pill.classList.add(glowClass);
                }, 320);
            } else {
                // Same position: glow appears instantly
                pill.classList.add(glowClass);
            }
        }

        iconTop.addEventListener('mouseenter', () => setHover('top'));
        iconBottom.addEventListener('mouseenter', () => setHover('bottom'));

        pill.addEventListener('mouseleave', () => {
            if (glowTimeout) {
                clearTimeout(glowTimeout);
                glowTimeout = null;
            }
            pill.classList.remove('is-hovering-top', 'is-hovering-bottom');
        });
    </script>
